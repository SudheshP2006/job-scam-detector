<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h3>Job Description</h3>
        <p>{{ text|safe }}</p>

        <hr>

        <!-- RESULT ALERT -->
        <div class="alert alert-{{ color }} text-center">
            <h4>{{ result }}</h4>
            <p>Scam Confidence: {{ confidence }}%</p>
        </div>

        <!-- MATCHED KEYWORDS -->
        {% if matched %}
        <div class="mt-3">
            <h5>Matched Keywords:</h5>
            <ul>
                {% for word in matched %}
                <li class="text-danger">{{ word }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}

        <a href="/" class="btn btn-secondary w-100 mt-3">Go Back</a>

    </div>
</div>

</body>
</html>
